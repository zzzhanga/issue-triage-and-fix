schema_version: 1

project:
  name: example-project
  repo_path: .
  role_assumption: frontend
  docs:
    - AGENTS.md
    - README.md

issue_source:
  # Feishu Project has a native adapter. For every other tracker, export JSON
  # first and import it with fetch-json/daily.
  platform: exported-json
  base_url: ""
  project_key: ""
  work_item_type: issue
  default_status: OPEN

field_mapping:
  id: work_item_id
  number: auto_number
  title: name
  status: work_item_status
  assignee: current_status_operator
  reporter: reporter
  priority: priority
  description: description
  requirements: requirements
  attachments: attachments
  created_at: created_at
  updated_at: updated_at

requirement_mapping:
  enabled: true
  issue_requirement_field: requirements
  current_repo:
    repo_key: current-repo
    path: .
    aliases:
      - current repo
      - web client
      - current service
  related_repositories: []
  demand_rules: []
  confirmation_policy:
    confidence_threshold: 0.75
    require_confirmation_when:
      - no_requirement
      - no_repo_match
      - multiple_repo_match
      - low_confidence

bugflow:
  enabled: true
  # Generated artifacts live here. Add `.bugflow/` to the host repo's .gitignore
  # unless the team intentionally wants to review bugflow artifacts in git.
  root: .bugflow/issues
  # Config/schema stays under `.codex/bugflow/` so it is separate from run output.
  schema: .codex/bugflow/schema.yaml
  commit_artifacts_by_default: false

query_policy:
  # Required before fetch-json/daily. Use the current user's tracker name or id.
  assigned_to: ""
  assignee_aliases: []
  status: OPEN
  limit: 20
  order_by: updated_at desc

ownership_rules:
  frontend_owned:
    - UI layout
    - CSS styles
    - frontend routing
    - tables
    - forms
    - modals
    - drawers
    - upload
    - rich text
    - mock data
    - frontend API mapping
  not_current_repo:
    - backend API failure
    - database cleanup
    - permission configuration
    - infrastructure
    - another client application
  backend_owned:
    - 列表接口排序
    - 接口返回顺序
    - 后端查询排序
    - 数据库排序
    - API contract

verification:
  package_manager: pnpm
  install: pnpm install
  format_write: pnpm exec prettier --write <changed-files>
  format_check: pnpm exec prettier --check <changed-files>
  lint: pnpm exec eslint <changed-files>
  stylelint: pnpm exec stylelint <changed-style-files>
  test: ""
  build: pnpm run build
  run_build_by_default: false

browser_verification:
  enabled: true
  dev_command: pnpm run dev
  app_url: http://localhost:5173
  surface_priority:
    - existing_chrome_tab
    - existing_in_app_browser_tab
    - new_in_app_browser_tab
  required_for:
    - style
    - table
    - modal
    - drawer
    - upload
    - rich-text
    - routing
    - visible-interaction
  routes: []

login_policy:
  method_priority:
    - existing_chrome_session
    - existing_in_app_browser_session
    - manual_user_login
    - env_test_account
    - mock_token
  never_request_password: true
  allow_qr_login: true
  test_account_env:
    username: PROJECT_TEST_USERNAME
    password: PROJECT_TEST_PASSWORD

remote_status_policy:
  # Exported JSON has no native remote adapter, so remote actions remain disabled.
  update_status_allowed: false
  update_comments_allowed: false
  default_change_to_in_progress: false
  default_resolve_for_acceptance: false
  default_complete: false
  default_terminate: false

statuses:
  open:
    id: OPEN
    label: 待修复
  in_progress:
    id:
    label: 修复中
  resolved_waiting_acceptance:
    id:
    label: 已解决，待验收
  reopened:
    id:
    label: 重新打开
  completed:
    id:
    label: 已完成
  terminated:
    id:
    label: 已终止

status_transitions:
  start_fix:
    from: open
    to: in_progress
    require_confirmation: true
  resolve_for_acceptance:
    from: in_progress
    to: resolved_waiting_acceptance
    require_confirmation: true
  complete:
    from: resolved_waiting_acceptance
    to: completed
    require_confirmation: true
  reopen:
    from: resolved_waiting_acceptance
    to: reopened
    require_confirmation: true
  terminate:
    to: terminated
    require_confirmation: true

execution_policy:
  # Classification never authorizes edits. Keep automation off until the team
  # intentionally reviews the policy; every fix still needs issue-specific approval.
  auto_fix_allowed: false
  auto_fix_low_risk_frontend: false
  allow_lightweight_verification: true
  approved_completion_actions:
    - commit
  max_auto_fix_effort: medium
  require_confirmation_for:
    - hard
    - blocked
    - needs-confirmation
    - not-current-repo
    - backend-contract-change

git_policy:
  # Keep automatic commits off. A manual commit also needs explicit approval,
  # current structured verification, and an initially empty Git index.
  auto_commit_after_fix: false
  commit_after_verification_only: true
  stage_policy: touched-files-only
  push_after_commit: false
  commit_message_template: "fix({issue}): {title}"

comment_template:
  enabled: false
  body: |
    Fix summary:
    - <summary>

    Verification:
    - <verification>

    Residual risk:
    - <risk>
