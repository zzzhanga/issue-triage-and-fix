name: issue-triage-and-fix
version: 4
description: Two-level intake with artifact-free preview, strict fix-ready gates, and autonomous or assisted repair execution profiles.

root: .bugflow/issues

modes:
  preview:
    description: In-memory current-assignee scan with provisional ownership, risk, priority, ranking, and suspected information gaps; does not create per-issue artifacts or run code/build/browser/remote actions.
    runner_command: preview
  fix-ready:
    description: User-selected or batch-authorized issue workflow with full comments/activities/attachment evidence, bound report quality, requirement matching, strict triage, plan-bound repair, and autonomous or assisted completion actions.

repair_profiles:
  autonomous:
    verification_modes:
      - standard
      - lightweight
    completion_actions:
      - start-fix
      - commit
      - resolve-for-acceptance
  assisted:
    verification_modes:
      - deferred-to-user
    completion_actions:
      - commit
      - start-fix
    status_timing: Keep the remote status unchanged until direct user verification passes, then execute start-fix only.

artifacts:
  - id: issue-intake
    generates: issue.json
    description: Normalized tracker issue with versioned runner metadata, requirement links, observable/reproduction/acceptance fields, inbound comments, activities, inspected attachment summaries, evidence completeness, report-quality status bound to the current versioned evidence input hash, and any safe local clarification draft; raw source data is redacted unless explicitly retained.
    requires: []
  - id: requirement-match
    generates: requirement-match.md
    description: Requirement-to-repository mapping, confidence, and customer confirmation question when needed.
    requires:
      - issue-intake
  - id: triage-report
    generates: triage.md
    description: Evidence/report quality, ownership, effort, readiness, risk, repair ranking, redirect/reject evidence, and any unpublished clarification draft.
    requires:
      - requirement-match
  - id: fix-plan
    generates: fix-plan.md
    description: Scoped implementation plan, verification mode, and completion actions after evidence is complete and report quality is sufficient.
    requires:
      - triage-report
  - id: implementation
    generates: implementation.md
    description: Code changes, files touched, remote status changes, and implementation notes.
    requires:
      - fix-plan
  - id: verification
    generates: verification.md
    description: Standard required checks, approved lightweight inspection, or direct deferred-to-user evidence after both intake gates pass; includes provenance, browser result, residual risk, and failures.
    requires:
      - implementation
  - id: closure
    generates: closure.md
    description: Remote comment text, final status decision, residual risk, and follow-up.
    requires:
      - verification

actions:
  preview:
    creates: []
    runner_command: preview
  fetch:
    creates:
      - issue-intake
  match:
    creates:
      - requirement-match
  triage:
    creates:
      - triage-report
  plan:
    creates:
      - fix-plan
    runner_command: plan-fix
  apply:
    creates:
      - implementation
    runner_command: record-implementation
  verify:
    creates:
      - verification
    runner_command: record-verification
  close:
    creates:
      - closure
    runner_command: close-local
  update:
    creates: []
  status:
    creates: []
  report-existing:
    creates: []
    runner_command: daily-existing
  migrate:
    creates: []
    runner_command: migrate-artifacts
