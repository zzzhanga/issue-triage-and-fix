name: issue-triage-and-fix
version: 1
description: Artifact-guided workflow for normalized issue triage, approved repair, verification, and closure.

root: .bugflow/issues

artifacts:
  - id: issue-intake
    generates: issue.json
    description: Normalized tracker issue with requirement links, inbound comments, activities, inspected attachment summaries, and evidence completeness; raw source data is redacted unless explicitly retained.
    requires: []
  - id: requirement-match
    generates: requirement-match.md
    description: Requirement-to-repository mapping, confidence, and customer confirmation question when needed.
    requires:
      - issue-intake
  - id: triage-report
    generates: triage.md
    description: Ownership, effort, readiness, risk, repair ranking, and redirect/reject evidence.
    requires:
      - requirement-match
  - id: fix-plan
    generates: fix-plan.md
    description: Scoped implementation plan, verification mode, and completion actions before code edits.
    requires:
      - triage-report
  - id: implementation
    generates: implementation.md
    description: Code changes, files touched, remote status changes, and implementation notes.
    requires:
      - fix-plan
  - id: verification
    generates: verification.md
    description: Standard checks or approved lightweight inspection evidence, browser result, residual risk, and failures.
    requires:
      - implementation
  - id: closure
    generates: closure.md
    description: Remote comment text, final status decision, residual risk, and follow-up.
    requires:
      - verification

actions:
  fetch:
    creates:
      - issue-intake
  match:
    creates:
      - requirement-match
  triage:
    creates:
      - triage-report
  plan:
    creates:
      - fix-plan
    runner_command: plan-fix
  apply:
    creates:
      - implementation
    runner_command: record-implementation
  verify:
    creates:
      - verification
    runner_command: record-verification
  close:
    creates:
      - closure
    runner_command: close-local
  update:
    creates: []
  status:
    creates: []
