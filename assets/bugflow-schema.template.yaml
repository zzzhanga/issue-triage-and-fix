name: issue-triage-and-fix
version: 1
description: Two-level workflow with an artifact-free preview scan by default and strict evidence/report-quality artifacts only after a concrete issue is selected for fix-ready repair.

root: .bugflow/issues

modes:
  preview:
    description: In-memory current-assignee scan with provisional ownership, risk, priority, ranking, and suspected information gaps; does not create per-issue artifacts or run code/build/browser/remote actions.
    runner_command: preview
  fix-ready:
    description: User-selected issue workflow with full comments/activities/attachment evidence, bound report quality, requirement matching, strict triage, approved repair, verification, commit, and authorized remote actions.

artifacts:
  - id: issue-intake
    generates: issue.json
    description: Normalized tracker issue with requirement links, observable/reproduction/acceptance fields, inbound comments, activities, inspected attachment summaries, evidence completeness, report-quality status bound to the current evidence input hash, and any safe local clarification draft; raw source data is redacted unless explicitly retained.
    requires: []
  - id: requirement-match
    generates: requirement-match.md
    description: Requirement-to-repository mapping, confidence, and customer confirmation question when needed.
    requires:
      - issue-intake
  - id: triage-report
    generates: triage.md
    description: Evidence/report quality, ownership, effort, readiness, risk, repair ranking, redirect/reject evidence, and any unpublished clarification draft.
    requires:
      - requirement-match
  - id: fix-plan
    generates: fix-plan.md
    description: Scoped implementation plan, verification mode, and completion actions after evidence is complete and report quality is sufficient.
    requires:
      - triage-report
  - id: implementation
    generates: implementation.md
    description: Code changes, files touched, remote status changes, and implementation notes.
    requires:
      - fix-plan
  - id: verification
    generates: verification.md
    description: Standard checks or approved lightweight inspection evidence after both intake gates pass, browser result, residual risk, and failures.
    requires:
      - implementation
  - id: closure
    generates: closure.md
    description: Remote comment text, final status decision, residual risk, and follow-up.
    requires:
      - verification

actions:
  preview:
    creates: []
    runner_command: preview
  fetch:
    creates:
      - issue-intake
  match:
    creates:
      - requirement-match
  triage:
    creates:
      - triage-report
  plan:
    creates:
      - fix-plan
    runner_command: plan-fix
  apply:
    creates:
      - implementation
    runner_command: record-implementation
  verify:
    creates:
      - verification
    runner_command: record-verification
  close:
    creates:
      - closure
    runner_command: close-local
  update:
    creates: []
  status:
    creates: []
  report-existing:
    creates: []
    runner_command: daily-existing
