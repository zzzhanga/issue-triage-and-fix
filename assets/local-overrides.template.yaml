schema_version: 2

# Optional local-only overrides. Keep this file out of git.
# Local overrides are deny-only safety controls: `false` may tighten a project
# permission, but `true` must never grant a permission denied by project config.
# Do not duplicate repo-scoped status ids, field mappings, requirement mappings,
# transitions, or ownership rules here.

extends:
  - .codex/bugflow/issue-triage.project.yaml

query_policy:
  assigned_to: current_login_user()
  # Add the current user's display name/user key/id when imported JSON does not
  # use the same value as assigned_to.
  assignee_aliases: []

browser_verification:
  app_url: http://localhost:5173
  surface_priority:
    - existing_chrome_tab
    - existing_in_app_browser_tab
    - new_in_app_browser_tab

login_policy:
  method_priority:
    - existing_chrome_session
    - existing_in_app_browser_session
    - manual_user_login
    - env_test_account
    - mock_token
  test_account_env:
    username: PROJECT_TEST_USERNAME
    password: PROJECT_TEST_PASSWORD

# Optional hard denies. Leave these commented when project policy should apply.
# Uncomment only the exact capability this machine/user must never perform.
# A local `true` never grants permission denied by project config.
#
# remote_status_policy:
#   update_status_allowed: false
#   update_comments_allowed: false
#   default_change_to_in_progress: false
#   default_resolve_for_acceptance: false
#   default_complete: false
#   default_terminate: false
#
# execution_policy:
#   auto_fix_allowed: false
#   auto_fix_low_risk_frontend: false
#   allow_lightweight_verification: false
#
# git_policy:
#   auto_commit_after_fix: false
#   push_after_commit: false
