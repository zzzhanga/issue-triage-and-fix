schema_version: 2

# Feishu Project repo-scoped config starter.
# Put a filled copy in .codex/bugflow/issue-triage.project.yaml by default so it stays local.
# Commit a copy only when the team intentionally wants to share the same workflow config.
# Keep personal tokens, cookies, MCP URLs, and passwords out of this file.
# Field keys and status ids below are common starters, not proof. Confirm them with
# Feishu field config for the target project before executing any status update.

project:
  name: example-project
  repo_path: .
  role_assumption: frontend
  docs:
    - AGENTS.md
    - README.md

issue_source:
  platform: feishu-project
  base_url: https://project.feishu.cn
  project_key: your-project-key
  work_item_type: issue
  default_status: OPEN
  default_status_label: 待修复
  allow_unverified_optional_fields: false

field_mapping:
  id: work_item_id
  number: auto_number
  title: name
  status: work_item_status
  assignee: current_status_operator
  reporter: owner
  priority: priority
  description: description
  requirements: _field_linked_story
  attachments: attachments
  created_at: start_time
  updated_at: updated_at

# Local mapping says how to read a field; it does not prove that the remote
# project exposes that exact key. Fill these only after exact field discovery.
field_verification:
  verified_keys: []
  source: ""
  verified_at: ""

requirement_mapping:
  enabled: true
  issue_requirement_field: _field_linked_story
  current_repo:
    repo_key: current-repo
    path: .
    aliases:
      - current repo
      - web client
      - current service
  related_repositories:
    - repo_key: companion-app
      path:
      aliases:
        - mobile client
        - related app
  demand_rules:
    - match_title_contains: example requirement keyword
      repo_keys:
        - current-repo
        - companion-app
      confirmation_owner: customer
  confirmation_policy:
    confidence_threshold: 0.75
    require_confirmation_when:
      - no_requirement
      - no_repo_match
      - multiple_repo_match
      - low_confidence

bugflow:
  enabled: true
  # Generated artifacts live here. Add `.bugflow/` to the host repo's .gitignore
  # unless the team intentionally wants to review bugflow artifacts in git.
  root: .bugflow/issues
  report_root: .bugflow/reports
  # Config/schema stays under `.codex/bugflow/` so it is separate from run output.
  schema: .codex/bugflow/schema.yaml
  commit_artifacts_by_default: false

query_policy:
  assigned_to: current_login_user()
  assignee_aliases: []
  requirement_ids: []
  requirement_mql_pushdown_verified: false
  status:
    - OPEN
    - REOPENED
  limit: 20
  order_by: updated_at desc

# Always confirm these ids with Feishu `list_workitem_field_config` for the target project.
statuses:
  open:
    id: OPEN
    label: 待修复
  in_progress:
    id: "IN PROGRESS"
    label: 修复中
  resolved_waiting_acceptance:
    id: RESOLVED
    label: 已解决，待验收
  reopened:
    id: REOPENED
    label: 重新打开
  completed:
    id: CLOSED
    label: 已完成
  terminated:
    id: systemEnded
    label: 已终止

status_transitions:
  start_fix:
    from: open
    to: in_progress
    require_confirmation: true
  resolve_for_acceptance:
    from: in_progress
    to: resolved_waiting_acceptance
    require_confirmation: true
  complete:
    from: resolved_waiting_acceptance
    to: completed
    require_confirmation: true
  reopen:
    from: resolved_waiting_acceptance
    to: reopened
    require_confirmation: true
  terminate:
    to: terminated
    require_confirmation: true

ownership_rules:
  frontend_owned:
    - UI layout
    - CSS styles
    - frontend routing
    - tables
    - forms
    - modals
    - drawers
    - upload
    - rich text
    - mock data
    - frontend API mapping
  not_current_repo:
    - backend API failure
    - database cleanup
    - permission configuration
    - infrastructure
    - another client application
  backend_owned:
    - 列表接口排序
    - 接口返回顺序
    - 后端查询排序
    - 数据库排序
    - API contract

verification:
  package_manager: pnpm
  install: pnpm install
  format_write: pnpm exec prettier --write <changed-files>
  format_check: pnpm exec prettier --check <changed-files>
  lint: pnpm exec eslint <changed-files>
  stylelint: pnpm exec stylelint <changed-style-files>
  test: ""
  build: pnpm run build
  run_build_by_default: false

browser_verification:
  enabled: true
  dev_command: pnpm run dev
  app_url: http://localhost:5173
  surface_priority:
    - existing_chrome_tab
    - existing_in_app_browser_tab
    - new_in_app_browser_tab
  required_for:
    - style
    - table
    - modal
    - drawer
    - upload
    - rich-text
    - routing
    - visible-interaction
  routes: []

login_policy:
  method_priority:
    - existing_chrome_session
    - existing_in_app_browser_session
    - manual_user_login
    - env_test_account
    - mock_token
  never_request_password: true
  allow_qr_login: true
  test_account_env:
    username: PROJECT_TEST_USERNAME
    password: PROJECT_TEST_PASSWORD

remote_status_policy:
  # Feishu repair transitions are capability gates, not automatic actions.
  # `default_resolve_for_acceptance` retains an explicit post-acceptance option,
  # but normal repair bundles below end at 修复中 and never invoke it automatically.
  update_status_allowed: true
  update_comments_allowed: false
  default_change_to_in_progress: true
  default_resolve_for_acceptance: true
  default_complete: false
  default_terminate: false

execution_policy:
  # Classification never authorizes edits. Keep automation off until the team
  # intentionally reviews the policy. A direct single/batch repair request supplies
  # one current-run authorization; each issue remains plan-bound and isolated.
  auto_fix_allowed: false
  auto_fix_low_risk_frontend: false
  default_repair_mode: autonomous
  # The exact approved plan may use this only for high-confidence, current-repo,
  # low/medium-risk frontend fixes that are impractical to verify automatically.
  allow_lightweight_verification: true
  # Assisted mode: modify and commit first without AI verification or a status
  # change; only after direct user verification may the issue move to 修复中.
  allow_deferred_user_verification: true
  approved_completion_actions:
    - commit
    - start-fix
  assisted_completion_actions:
    - commit
    - start-fix
  max_auto_fix_effort: medium
  require_confirmation_for:
    - hard
    - blocked
    - needs-confirmation
    - not-current-repo
    - backend-contract-change

git_policy:
  # Keep automatic commits off. A plan-bound commit needs an initially empty Git
  # index. Autonomous mode requires verification first; assisted mode may use the
  # explicit allow_deferred_user_verification exception.
  auto_commit_after_fix: false
  commit_after_verification_only: true
  stage_policy: touched-files-only
  push_after_commit: false
  commit_message_template: "fix({issue}): {title}"

comment_template:
  enabled: false
  body: |
    修复说明：
    - <summary>

    验证结果：
    - <verification>

    剩余风险：
    - <risk>
